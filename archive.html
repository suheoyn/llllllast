<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank Object Archive</title>
  <style>
    @font-face {
      font-family: 'TSCPaperletterOTF';
      src: local('TSCPaperletterOTF'), local('TSCPaperletter'), local('TSC원고지글씨OTF'), local('TSC원고지글씨');
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'TSCPaperletterOTF', sans-serif;
      background: #f7f7f7;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f7f7f7;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .site-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      white-space: nowrap;
      color: #222;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .site-title:hover {
      opacity: 0.6;
    }

    .search-wrap {
      flex: 1;
      display: flex;
      justify-content: flex-end;
    }

    .search-input {
      width: 160px;
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 12px;
      background: #fff;
      outline: none;
      transition: width 0.3s ease, border-color 0.2s;
    }

    .search-input:focus {
      width: 220px;
      border-color: #888;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #555;
      font-size: 16px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .header-icon:hover {
      background: #eee;
    }

    .column-control-wrap {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: 10px;
      margin-right: 4px;
    }

    .col-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: 1px solid #ccc;
      border-radius: 50%;
      font-size: 16px;
      font-family: 'TSCPaperletterOTF', sans-serif;
      font-weight: 500;
      color: #555;
      transition: background 0.2s, border-color 0.2s;
      outline: none;
      user-select: none;
    }

    .col-btn:hover {
      background: #eee;
      border-color: #888;
    }

    .col-btn:active {
      background: #ddd;
    }

    /* ── Grid ── */
    .grid-main {
      padding: 0 16px;
    }

    .object-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .grid-cell {
      border: 1px solid #ddd;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin: -0.5px;
      /* collapse borders */
      position: relative;
      z-index: 1;
    }

    .grid-cell:hover {
      transform: scale(1.1);
      z-index: 2;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .grid-cell img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── Footer area ── */
    .footer-area {
      text-align: center;
      padding: 80px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .add-btn {
      display: inline-block;
      padding: 10px 32px;
      background: #f05a4a;
      color: #fff;
      font-family: 'TSCPaperletterOTF', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
      letter-spacing: 0.04em;
    }

    .add-btn:hover {
      background: #d94b3a;
      transform: translateY(-1px);
    }

    .s2-footer {
      margin-top: 100px;
      font-size: clamp(14px, 1.0vw, 18px);
      background: #ccc;
      color: #222;
      width: 100%;
      padding: 30px 20px;
      text-align: center;
      box-sizing: border-box;
      font-family: 'TSCPaperletterOTF', sans-serif;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-card {
      background: #fff;
      border-radius: 12px;
      width: 360px;
      max-width: 92vw;
      padding: 28px 24px 20px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 18px;
      cursor: pointer;
      color: #888;
      background: none;
      border: none;
    }

    .modal-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .modal-img-wrap img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .modal-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #111;
    }

    .modal-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }

    /* ── Add Modal specific styles ── */
    .add-modal-card {
      background: #fff;
      border-radius: 16px;
      width: 440px;
      max-width: 92vw;
      padding: 36px 28px 28px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      border: 1px solid #eee;
    }

    .add-modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .form-group input[type="text"],
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .form-group input[type="text"]:focus,
    .form-group textarea:focus {
      border-color: #f05a4a;
      box-shadow: 0 0 0 3px rgba(240, 90, 74, 0.15);
    }

    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    .upload-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      min-height: 120px;
      box-sizing: border-box;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #f05a4a;
      background: #fafafa;
    }

    .upload-icon-svg {
      width: 32px;
      height: 32px;
      color: #aaa;
    }

    .upload-text {
      font-size: 12px;
      color: #888;
    }

    .preview-img {
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
      border-radius: 4px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #f05a4a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.05em;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: #d94b3a;
      transform: translateY(-1px);
    }

    .toast-message {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translate(-50%, 100px);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast-message.show {
      transform: translate(-50%, 0);
    }

    /* ── Character Play Section ── */
    .character-play-section {
      width: 100%;
      margin: 0;
      padding: 0;
      background: #fff;
      border-bottom: none;
      display: block;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      cursor: pointer;
    }

    .video-wrapper video {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }

    #video-2 {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      pointer-events: none;
    }

    .click-text {
      position: absolute;
      color: black;
      font-size: clamp(24px, 2.5vw, 40px);
      font-family: 'TSCPaperletterOTF', 'TSCPaperLetter', sans-serif;
      font-weight: 400;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
      animation: floatFade 2s ease forwards;
    }

    @keyframes floatFade {
      0% {
        opacity: 0;
        margin-top: 10px;
      }

      10% {
        opacity: 1;
        margin-top: 0;
      }

      80% {
        opacity: 1;
        margin-top: -10px;
      }

      100% {
        opacity: 0;
        margin-top: -20px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="site-title">Blank Object Archive</a>
    <div class="search-wrap">
      <input class="search-input" type="text" id="search-input" placeholder="🔍 검색">
    </div>
    <div class="column-control-wrap">
      <button class="col-btn" id="col-dec-btn" title="열 줄이기 (크게 보기)">+</button>
      <button class="col-btn" id="col-inc-btn" title="열 늘리기 (작게 보기)">-</button>
    </div>
    <a href="index.html" class="header-icon" title="홈으로" style="text-decoration:none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
    </a>
  </header>

  <!-- Character Play Section -->
  <section class="character-play-section">
    <div class="video-wrapper" id="video-wrapper">
      <video id="video-1" src="_1.gif" autoplay loop muted playsinline></video>
      <video id="video-2" src="_2.gif" playsinline></video>
    </div>
    <div
      style="text-align: center; color: #000; font-size: 17px; padding: 16px 0 40px; font-weight: 500; letter-spacing: -0.5px;">
      위에 아이를 누르면서 같이 단어를 생각해보세요!
    </div>
  </section>

  <!-- Grid -->
  <main class="grid-main">
    <div class="object-grid" id="object-grid">
      <!-- injected by JS -->
    </div>
  </main>

  <!-- Footer -->
  <div class="footer-area">
    <button class="add-btn" id="add-btn">물건 추가하기</button>
    <footer class="s2-footer">
      Blank Object Archive &copy; 2026. Suhyun All rights reserved.
    </footer>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-img-wrap">
        <img id="modal-img" src="" alt="">
      </div>
      <p class="modal-name" id="modal-name"></p>
      <p class="modal-desc" id="modal-desc"></p>
    </div>
  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="add-modal-overlay">
    <div class="add-modal-card">
      <button class="modal-close" id="add-modal-close">✕</button>
      <h2 class="add-modal-title">새 물건 등록하기</h2>
      <div class="form-group">
        <label>물건 이미지</label>
        <div class="upload-zone" id="upload-zone">
          <input type="file" id="item-file-input" accept="image/*" style="display:none">
          <svg class="upload-icon-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span class="upload-text" id="upload-text">클릭하거나 이미지를 드래그하여 업로드</span>
          <img class="preview-img" id="preview-img" src="" alt="미리보기">
        </div>
      </div>
      <div class="form-group">
        <label for="item-name">이름</label>
        <input type="text" id="item-name" placeholder="그 뭐라고 부르는 사물인가요?">
      </div>
      <div class="form-group">
        <label for="item-desc">간단 설명</label>
        <textarea id="item-desc" placeholder="물건의 용도나 특징을 설명해 주세요."></textarea>
      </div>
      <button class="submit-btn" id="submit-btn">등록하기</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast-message" id="toast-message"></div>

      { id: 50, file: '50_paper tube.png', name: '지관', desc: '두루마리 화장지나 주방 타올 안에 있는 원통형 종이 심', tags: '화장지 두루마리 종이 심 재활용 원통 공예 갈색 종이색 브라운 황토색' },
    ];

    const grid = document.getElementById('object-grid');
    const searchInput = document.getElementById('search-input');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalClose = document.getElementById('modal-close');
    const modalImg = document.getElementById('modal-img');
    const modalName = document.getElementById('modal-name');
    const modalDesc = document.getElementById('modal-desc');

    function renderGrid(list) {
      grid.innerHTML = '';
      list.forEach(obj => {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        const imgSrc = obj.file.startsWith('data:') || obj.file.startsWith('blob:') ? obj.file : `assets/${obj.file}`;
        cell.innerHTML = `<img src="${imgSrc}" alt="${obj.name}" loading="lazy">`;
        cell.addEventListener('click', () => openModal(obj));
        grid.appendChild(cell);
      });
    }

    function openModal(obj) {
      const imgSrc = obj.file.startsWith('data:') || obj.file.startsWith('blob:') ? obj.file : `assets/${obj.file}`;
      modalImg.src = imgSrc;
      modalImg.alt = obj.name;
      modalName.textContent = obj.name;
      modalDesc.textContent = obj.desc;
      modalOverlay.classList.add('active');
    }

    modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('active');
    });

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        renderGrid(objects);
        return;
      }
      const keywords = q.split(/\s+/);
      const filtered = objects.filter(o => {
        const textToSearch = (o.name + ' ' + o.desc + (o.tags ? ' ' + o.tags : '')).toLowerCase();
        // 모든 키워드가 이름이나 설명(또는 태그)에 포함되어 있는지 확인
        return keywords.every(kw => textToSearch.includes(kw));
      });
      renderGrid(filtered);
    });

    // Grid column scaling controls
    let columnCount = 4;
    const colDecBtn = document.getElementById('col-dec-btn');
    const colIncBtn = document.getElementById('col-inc-btn');

    function updateGridColumns() {
      grid.style.gridTemplateColumns = `repeat(${columnCount}, 1fr)`;
    }

    colDecBtn.addEventListener('click', () => {
      if (columnCount > 2) {
        columnCount--;
        updateGridColumns();
      }
    });

    colIncBtn.addEventListener('click', () => {
      if (columnCount < 8) {
        columnCount++;
        updateGridColumns();
      }
    });

    // ── Add Modal Elements & Events ──
    const addBtn = document.getElementById('add-btn');
    const addModalOverlay = document.getElementById('add-modal-overlay');
    const addModalClose = document.getElementById('add-modal-close');
    const uploadZone = document.getElementById('upload-zone');
    const itemFileInput = document.getElementById('item-file-input');
    const uploadText = document.getElementById('upload-text');
    const previewImg = document.getElementById('preview-img');
    const uploadIconSvg = document.querySelector('.upload-icon-svg');
    const submitBtn = document.getElementById('submit-btn');
    const toastMessage = document.getElementById('toast-message');

    let uploadedImageData = '';

    function showToast(message) {
      toastMessage.textContent = message;
      toastMessage.classList.add('show');
      setTimeout(() => {
        toastMessage.classList.remove('show');
      }, 2500);
    }

    addBtn.addEventListener('click', () => {
      uploadedImageData = '';
      previewImg.src = '';
      previewImg.style.display = 'none';
      uploadIconSvg.style.display = 'block';
      uploadText.style.display = 'block';
      document.getElementById('item-name').value = '';
      document.getElementById('item-desc').value = '';
      addModalOverlay.classList.add('active');
    });

    addModalClose.addEventListener('click', () => {
      addModalOverlay.classList.remove('active');
    });

    addModalOverlay.addEventListener('click', (e) => {
      if (e.target === addModalOverlay) addModalOverlay.classList.remove('active');
    });

    uploadZone.addEventListener('click', () => {
      itemFileInput.click();
    });

    itemFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleFile(file);
      } else {
        showToast('이미지 파일만 업로드할 수 있습니다.');
      }
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImageData = e.target.result;
        previewImg.src = uploadedImageData;
        previewImg.style.display = 'block';
        uploadIconSvg.style.display = 'none';
        uploadText.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    submitBtn.addEventListener('click', () => {
      const name = document.getElementById('item-name').value.trim();
      const desc = document.getElementById('item-desc').value.trim();

      if (!uploadedImageData) {
        showToast('이미지를 등록해 주세요.');
        return;
      }
      if (!name) {
        showToast('이름을 입력해 주세요.');
        return;
      }
      if (!desc) {
        showToast('간단 설명을 입력해 주세요.');
        return;
      }

      const newItem = {
        id: Date.now(),
        file: uploadedImageData,
        name: name,
        desc: desc
      };

      objects.unshift(newItem); // Add new item to front of objects array
      renderGrid(objects); // Redraw grid
      addModalOverlay.classList.remove('active'); // Close modal
      showToast('물건이 성공적으로 등록되었습니다!');
    });

    // ── Character Video Logic ──
    const videoWrapper = document.getElementById('video-wrapper');
    const vid1 = document.getElementById('video-1');
    const vid2 = document.getElementById('video-2');
    let isPlayingTwo = false;

    videoWrapper.addEventListener('click', () => {
      // ── Spawn random text ──
      const phrases = [
        "그 뭐였지..", "그그그 그", "아 그거", "그거 있잖아", "어...",
        "그거 뭐였더라", "아아아 아 그", " 그 그!!", "아 그거!!"
      ];
      const textEl = document.createElement('div');
      textEl.className = 'click-text';
      textEl.textContent = phrases[Math.floor(Math.random() * phrases.length)];

      // Decide edge to avoid center (0: top, 1: right, 2: bottom, 3: left)
      const edge = Math.floor(Math.random() * 4);
      let randomTop, randomLeft;

      if (edge === 0) {
        randomTop = Math.random() * 15; // 0~15%
        randomLeft = Math.random() * 80;
      } else if (edge === 1) {
        randomTop = Math.random() * 80;
        randomLeft = 75 + Math.random() * 15; // 75~90%
      } else if (edge === 2) {
        randomTop = 75 + Math.random() * 15; // 75~90%
        randomLeft = Math.random() * 80;
      } else {
        randomTop = Math.random() * 80;
        randomLeft = Math.random() * 15; // 0~15%
      }
      const randomRot = -15 + Math.random() * 30; // -15deg ~ 15deg

      textEl.style.top = `${randomTop}%`;
      textEl.style.left = `${randomLeft}%`;
      textEl.style.transform = `rotate(${randomRot}deg)`;

      videoWrapper.appendChild(textEl);
      setTimeout(() => textEl.remove(), 2000);

      if (isPlayingTwo) return; // Prevent double click
      isPlayingTwo = true;

      vid1.style.opacity = '0';
      vid2.style.opacity = '1';

      vid2.currentTime = 0;
      vid2.play();
    });

    vid2.addEventListener('ended', () => {
      if (isPlayingTwo) {
        isPlayingTwo = false;

        vid2.style.opacity = '0';
        vid1.style.opacity = '1';

        vid1.play();
      }
    });

    // Initial render
    renderGrid(objects);
  </script>
